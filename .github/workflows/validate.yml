name: Validar Planorha

on:
  push:
    branches: [main, feature/hito-3-productividad]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener código
        uses: actions/checkout@v4
      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validar sintaxis
        run: npm run check
      - name: Ejecutar pruebas
        run: npm test
